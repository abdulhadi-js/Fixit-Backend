<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - FixIt</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#410004",
                        "text-primary": "#18181B",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#1b1b1e",
                        "on-primary-fixed-variant": "#005137",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f5fbf5",
                        "accent-hover": "#047857",
                        "border-soft": "#E4E4E7",
                        "on-surface": "#171d19",
                        "outline": "#6d7a72",
                        "secondary": "#5f5e61",
                        "canvas": "#FAFAFA",
                        "secondary-container": "#e4e1e6",
                        "surface": "#f5fbf5",
                        "on-primary-fixed": "#002114",
                        "surface-container": "#e9efe9",
                        "tertiary": "#9b3e3b",
                        "surface-muted": "#F4F4F5",
                        "on-error": "#ffffff",
                        "tertiary-container": "#ba5551",
                        "primary-fixed-dim": "#68dba9",
                        "on-tertiary-fixed-variant": "#7f2928",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#656467",
                        "secondary-fixed": "#e4e1e6",
                        "on-surface-variant": "#3d4a42",
                        "surface-tint": "#006c4a",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "surface-dim": "#d5dcd6",
                        "surface-container-highest": "#dee4de",
                        "background": "#f5fbf5",
                        "inverse-surface": "#2c322e",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#eff5ef",
                        "text-secondary": "#71717A",
                        "tertiary-fixed": "#ffdad7",
                        "primary": "#006948",
                        "primary-container": "#00855d",
                        "on-background": "#171d19",
                        "on-primary-container": "#f5fff7",
                        "surface-container-high": "#e4eae4",
                        "inverse-primary": "#68dba9",
                        "primary-fixed": "#85f8c4",
                        "on-secondary-fixed-variant": "#47464a",
                        "secondary-fixed-dim": "#c8c5ca",
                        "surface-variant": "#dee4de",
                        "outline-variant": "#bccac0",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#ecf2ec",
                        "surface-container-lowest": "#ffffff",
                        "surface-high": "#FFFFFF",
                        "tertiary-fixed-dim": "#ffb3ae"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "gap-tight": "1rem",
                        "margin-x": "2rem",
                        "gap-standard": "1.5rem",
                        "gutter": "1.5rem"
                    },
                    "fontFamily": {
                        "caption": ["Geist", "sans-serif"],
                        "label-md": ["Geist", "sans-serif"],
                        "headline-md": ["Geist", "sans-serif"],
                        "headline-lg-mobile": ["Geist", "sans-serif"],
                        "body-md": ["Geist", "sans-serif"],
                        "headline-lg": ["Geist", "sans-serif"]
                    },
                    "fontSize": {
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.025em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["30px", { "lineHeight": "36px", "letterSpacing": "-0.025em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Geist', sans-serif; }
    </style>
</head>
<body class="bg-canvas text-text-primary antialiased min-h-screen flex flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8">
<div class="w-full max-w-lg bg-surface-high border border-border-soft rounded-2xl p-8 shadow-sm">
<div class="mb-8 text-center">
<div class="flex justify-center items-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">handyman</span>
<span class="font-headline-lg text-headline-lg ml-2">FixIt</span>
</div>
<h1 class="font-headline-lg text-headline-lg mb-2">Create an account</h1>
<p class="font-body-md text-body-md text-text-secondary">Join FixIt to book or provide home services.</p>
</div>
<form class="space-y-6">
<!-- Role Selector -->
<div>
<span class="font-label-md text-label-md text-text-primary block mb-3">I am a...</span>
<div class="grid grid-cols-2 gap-4">
<label class="relative cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio" value="consumer"/>
<div class="w-full h-full p-4 rounded-xl border border-border-soft bg-surface-high text-center hover:bg-surface-muted transition-colors peer-checked:border-primary peer-checked:bg-surface-container-low">
<span class="material-symbols-outlined text-text-secondary peer-checked:text-primary mb-2 block text-2xl">house</span>
<span class="font-label-md text-label-md text-text-primary">Consumer</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="technician"/>
<div class="w-full h-full p-4 rounded-xl border border-border-soft bg-surface-high text-center hover:bg-surface-muted transition-colors peer-checked:border-primary peer-checked:bg-surface-container-low">
<span class="material-symbols-outlined text-text-secondary peer-checked:text-primary mb-2 block text-2xl">build</span>
<span class="font-label-md text-label-md text-text-primary">Technician</span>
</div>
</label>
</div>
</div>
<!-- Input Fields -->
<div class="space-y-4">
<div>
<label class="font-label-md text-label-md text-text-primary block mb-1" for="fullName">Full Name</label>
<input class="w-full bg-surface-muted border border-border-soft rounded-lg px-4 py-3 font-body-md text-body-md text-text-primary focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-shadow" id="fullName" name="fullName" placeholder="John Doe" type="text"/>
</div>
<div>
<label class="font-label-md text-label-md text-text-primary block mb-1" for="phone">Phone Number</label>
<input class="w-full bg-surface-muted border border-border-soft rounded-lg px-4 py-3 font-body-md text-body-md text-text-primary focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-shadow" id="phone" name="phone" placeholder="+92 3XX XXXXXXX" type="tel"/>
</div>
<div>
<label class="font-label-md text-label-md text-text-primary block mb-1" for="password">Password</label>
<input class="w-full bg-surface-muted border border-border-soft rounded-lg px-4 py-3 font-body-md text-body-md text-text-primary focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-shadow" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start">
<div class="flex items-center h-5">
<input class="w-4 h-4 border-border-soft rounded bg-surface-muted text-primary focus:ring-primary focus:ring-2" id="terms" name="terms" type="checkbox"/>
</div>
<div class="ml-3 font-body-md text-body-md">
<label class="text-text-secondary" for="terms">I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.</label>
</div>
</div>
<!-- CTA -->
<div>
<button class="w-full bg-primary hover:bg-accent-hover text-on-primary font-headline-md text-headline-md py-3 px-4 rounded-lg transition-colors flex justify-center items-center" type="submit">
                    Create Account
                </button>
</div>
</form>
<!-- Footer link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-text-secondary">
                Already have an account? <a class="text-primary font-label-md text-label-md hover:underline" href="#">Sign in</a>
</p>
</div>
</div>
</body></html>
