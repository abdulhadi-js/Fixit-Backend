<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FixIt - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#eff5ef",
                        "tertiary-container": "#ba5551",
                        "on-secondary-fixed": "#1b1b1e",
                        "secondary": "#5f5e61",
                        "inverse-surface": "#2c322e",
                        "on-tertiary-fixed": "#410004",
                        "surface-muted": "#F4F4F5",
                        "inverse-primary": "#68dba9",
                        "on-primary-fixed": "#002114",
                        "surface-tint": "#006c4a",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#dee4de",
                        "tertiary-fixed": "#ffdad7",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#ecf2ec",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#656467",
                        "tertiary-fixed-dim": "#ffb3ae",
                        "on-background": "#171d19",
                        "secondary-container": "#e4e1e6",
                        "primary": "#006948",
                        "canvas": "#FAFAFA",
                        "surface-high": "#FFFFFF",
                        "primary-fixed": "#85f8c4",
                        "on-tertiary": "#ffffff",
                        "text-secondary": "#71717A",
                        "on-tertiary-container": "#fffbff",
                        "tertiary": "#9b3e3b",
                        "outline": "#6d7a72",
                        "accent-hover": "#047857",
                        "primary-container": "#00855d",
                        "on-primary-container": "#f5fff7",
                        "on-tertiary-fixed-variant": "#7f2928",
                        "secondary-fixed": "#e4e1e6",
                        "outline-variant": "#bccac0",
                        "on-primary-fixed-variant": "#005137",
                        "text-primary": "#18181B",
                        "border-soft": "#E4E4E7",
                        "background": "#f5fbf5",
                        "surface-bright": "#f5fbf5",
                        "on-secondary-fixed-variant": "#47464a",
                        "surface-container": "#e9efe9",
                        "surface-variant": "#dee4de",
                        "surface": "#f5fbf5",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e4eae4",
                        "primary-fixed-dim": "#68dba9",
                        "on-surface": "#171d19",
                        "secondary-fixed-dim": "#c8c5ca",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#3d4a42",
                        "surface-dim": "#d5dcd6",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-x": "2rem",
                        "container-max": "1280px",
                        "gutter": "1.5rem",
                        "gap-standard": "1.5rem",
                        "gap-tight": "1rem"
                    },
                    "fontFamily": {
                        "body-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "label-md": ["Geist"],
                        "headline-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "caption": ["Geist"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["30px", { "lineHeight": "36px", "letterSpacing": "-0.025em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.025em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Geist', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-muted min-h-screen flex items-center justify-center p-4">
<!-- Central Bento Card -->
<main class="w-full max-w-md bg-surface-high rounded-xl border border-border-soft p-8">
<!-- Header -->
<header class="mb-8 text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome back</h1>
<p class="font-body-md text-body-md text-text-secondary">Enter your details to sign in to FixIt.</p>
</header>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-text-primary" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary text-lg" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 font-body-md text-body-md bg-surface-muted border border-border-soft rounded-lg text-text-primary focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block font-label-md text-label-md text-text-primary" for="password">Password</label>
<a class="font-label-md text-label-md text-text-secondary hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 font-body-md text-body-md bg-surface-muted border border-border-soft rounded-lg text-text-primary focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                Sign In
            </button>
</form>
<!-- Footer -->
<footer class="mt-8 text-center">
<p class="font-body-md text-body-md text-text-secondary">
                Don't have an account? <a class="font-label-md text-label-md text-primary hover:text-accent-hover transition-colors underline decoration-transparent hover:decoration-primary underline-offset-4" href="#">Sign up</a>
</p>
</footer>
</main>
</body></html>
