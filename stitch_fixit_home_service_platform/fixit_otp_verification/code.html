<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #FAFAFA; /* Theme Canvas */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }
        /* Custom hide spin buttons for OTP inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {

<body class="bg-canvas min-h-screen flex flex-col">
<!-- TopNavBar (Shared Component) -->

<!-- Main Content -->
<main class="flex-grow flex items-center justify-center pt-16 px-gutter">
<!-- Central Content: Bento Card -->
<div class="w-full max-w-md bg-surface-high rounded-xl p-8 border border-border-soft shadow-sm my-20 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Header Section -->
<div class="text-center mb-8">
<div class="mb-4 inline-flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-low text-primary">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-2">Verify your account</h1>
<p class="font-body-md text-body-md text-text-secondary">
                    We've sent a 6-digit code to your phone number <span class="font-medium text-text-primary">+92 3XX XXXXXXX</span>
</p>
</div>
<!-- OTP Form -->
<form class="space-y-8" id="otp-form">
<!-- OTP Grid -->
<div class="flex justify-between gap-2 md:gap-3" id="otp-inputs">
<input class="otp-input w-12 h-14 bg-surface-muted border border-border-soft text-center text-xl font-semibold focus:border-primary focus:ring-1 focus:ring-primary rounded-lg transition-all outline-none" maxlength="1" required="" type="number">
<input class="otp-input w-12 h-14 bg-surface-muted border border-border-soft text-center text-xl font-semibold focus:border-primary focus:ring-1 focus:ring-primary rounded-lg transition-all outline-none" maxlength="1" required="" type="number">
<input class="otp-input w-12 h-14 bg-surface-muted border border-border-soft text-center text-xl font-semibold focus:border-primary focus:ring-1 focus:ring-primary rounded-lg transition-all outline-none" maxlength="1" required="" type="number">
<input class="otp-input w-12 h-14 bg-surface-muted border border-border-soft text-center text-xl font-semibold focus:border-primary focus:ring-1 focus:ring-primary rounded-lg transition-all outline-none" maxlength="1" required="" type="number">
<input class="otp-input w-12 h-14 bg-surface-muted border border-border-soft text-center text-xl font-semibold focus:border-primary focus:ring-1 focus:ring-primary rounded-lg transition-all outline-none" maxlength="1" required="" type="number">
<input class="otp-input w-12 h-14 bg-surface-muted border border-border-soft text-center text-xl font-semibold focus:border-primary focus:ring-1 focus:ring-primary rounded-lg transition-all outline-none" maxlength="1" required="" type="number">
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-accent-hover text-on-primary font-label-md text-label-md py-4 rounded-lg shadow-sm transition-all duration-200 active:scale-[0.98] focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                    Verify &amp; Continue
                </button>
</form>
<!-- Resend Section -->
<div class="mt-8 text-center">
<p class="font-caption text-caption text-text-secondary">
                    Didn't receive the code? 
                    <span class="ml-1" id="resend-timer-text">Resend in <span class="font-medium text-text-primary" id="timer">0:32</span></span>
<button class="hidden ml-1 text-primary font-medium hover:underline opacity-50 cursor-not-allowed transition-all" disabled="" id="resend-btn">Resend</button>
</p>
</div>
</div>
</main>
<!-- Footer (Shared Component) -->

<script>
        // OTP Input Logic
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value !== '' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Timer Logic
        let timeLeft = 59;
        const timerElement = document.getElementById('timer');
        const timerText = document.getElementById('resend-timer-text');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerText.classList.add('hidden');
                resendBtn.classList.remove('hidden');
                resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                resendBtn.classList.add('cursor-pointer');
                resendBtn.disabled = false;
            } else {
                let seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
                timerElement.innerText = `0:${seconds}`;
                timeLeft--;
            }
        }, 1000);

        // Form Submit
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const otp = Array.from(inputs).map(input => input.value).join('');
            if (otp.length === 6) {
                // Visual feedback for success
                const btn = e.target.querySelector('button');
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
                setTimeout(() => {
                    btn.innerHTML = 'Success!';
                    btn.classList.replace('bg-primary', 'bg-emerald-500');
                }, 1500);
            }
        });
    </script>
