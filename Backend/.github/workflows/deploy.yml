name: 🚀 CI/CD — Build, Push & Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build Docker image & push to Docker Hub
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fixit-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/fixit-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 2: SSH into EC2 and deploy
  # ─────────────────────────────────────────
  deploy:
    name: 🖥️ Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🚀 SSH into EC2 and deploy latest image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "⬇️ Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/fixit-backend:latest

            echo "🛑 Stopping old container..."
            docker stop fixit_api || true
            docker rm fixit_api || true

            echo "▶️ Starting new container..."
            docker run -d \
              --name fixit_api \
              --restart always \
              -p 3001:3001 \
              --env-file /home/ubuntu/.env \
              ${{ secrets.DOCKER_USERNAME }}/fixit-backend:latest

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete!"
